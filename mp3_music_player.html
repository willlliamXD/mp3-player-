
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #D85A30;
  --accent2: #1D9E75;
  --bg: var(--color-background-primary);
  --bg2: var(--color-background-secondary);
  --bg3: var(--color-background-tertiary);
  --text: var(--color-text-primary);
  --muted: var(--color-text-secondary);
  --border: var(--color-border-tertiary);
}

.app { font-family: 'DM Sans', sans-serif; padding: 1rem 0; max-width: 680px; }

.tabs { display: flex; gap: 0; border: 0.5px solid var(--border); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 1.25rem; }
.tab { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; background: var(--bg2); color: var(--muted); border: none; cursor: pointer; transition: all .15s; }
.tab.active { background: var(--bg); color: var(--text); }

.player-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }

.now-playing-section { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
.album-art { width: 72px; height: 72px; border-radius: 8px; background: var(--bg2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; font-size: 28px; }
.album-art img { width: 100%; height: 100%; object-fit: cover; }
.track-info { flex: 1; min-width: 0; }
.track-title { font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 13px; color: var(--muted); margin-top: 2px; }
.track-playlist { font-size: 11px; color: var(--accent); margin-top: 4px; font-weight: 500; }

.progress-section { margin-bottom: 1rem; }
.progress-bar-wrap { position: relative; height: 4px; background: var(--bg2); border-radius: 2px; cursor: pointer; margin-bottom: 6px; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); width: 0%; transition: width .1s; pointer-events: none; }
.time-row { display: flex; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

.controls { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1rem; }
.ctrl-btn { width: 36px; height: 36px; border-radius: 50%; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; }
.ctrl-btn:hover { background: var(--bg3); }
.ctrl-btn.active { color: var(--accent); border-color: var(--accent); }
.play-btn { width: 48px; height: 48px; font-size: 18px; background: var(--accent); color: white; border-color: transparent; }
.play-btn:hover { opacity: .9; }

.volume-row { display: flex; align-items: center; gap: 8px; }
.vol-icon { font-size: 14px; width: 20px; text-align: center; }
.vol-label { font-size: 12px; color: var(--muted); width: 28px; text-align: right; font-family: 'Space Mono', monospace; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.add-btn { font-size: 12px; font-weight: 500; color: var(--accent2); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.add-btn:hover { background: var(--bg2); }

.playlist-list, .track-list { display: flex; flex-direction: column; gap: 4px; }

.playlist-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--border-radius-md); border: 0.5px solid transparent; cursor: pointer; transition: all .15s; }
.playlist-item:hover { background: var(--bg2); }
.playlist-item.active { background: var(--bg2); border-color: var(--border); }
.pl-icon { width: 32px; height: 32px; border-radius: 6px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.pl-info { flex: 1; min-width: 0; }
.pl-name { font-size: 14px; font-weight: 500; color: var(--text); }
.pl-count { font-size: 12px; color: var(--muted); }
.pl-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.playlist-item:hover .pl-actions { opacity: 1; }
.pl-act-btn { width: 24px; height: 24px; border-radius: 4px; border: 0.5px solid var(--border); background: var(--bg); color: var(--muted); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.pl-act-btn:hover { color: var(--text); }

.track-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--border-radius-md); cursor: pointer; transition: background .15s; }
.track-item:hover { background: var(--bg2); }
.track-item.active { background: var(--bg2); }
.track-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); width: 20px; text-align: center; flex-shrink: 0; }
.track-item-art { width: 36px; height: 36px; border-radius: 6px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.track-item-info { flex: 1; min-width: 0; }
.track-item-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-item-artist { font-size: 12px; color: var(--muted); }
.track-item-dur { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
.track-item-menu { position: relative; }
.track-menu-btn { width: 24px; height: 24px; border-radius: 4px; border: none; background: none; color: var(--muted); font-size: 16px; cursor: pointer; opacity: 0; }
.track-item:hover .track-menu-btn { opacity: 1; }
.track-menu-btn:hover { background: var(--bg3); }
.dropdown { position: absolute; right: 0; top: 28px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--border-radius-md); box-shadow: 0 4px 12px rgba(0,0,0,.08); z-index: 100; min-width: 160px; }
.dropdown-item { padding: 8px 14px; font-size: 13px; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 8px; }
.dropdown-item:hover { background: var(--bg2); }
.dropdown-item.danger { color: #E24B4A; }

.upload-zone { border: 1.5px dashed var(--border); border-radius: var(--border-radius-lg); padding: 2rem; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 1rem; }
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--bg2); }
.upload-icon { font-size: 32px; margin-bottom: .5rem; }
.upload-text { font-size: 14px; color: var(--muted); }
.upload-sub { font-size: 12px; color: var(--color-text-tertiary); margin-top: 4px; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--border-radius-lg); padding: 1.5rem; width: 320px; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
.modal input { width: 100%; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--border-radius-md); font-size: 14px; background: var(--bg2); color: var(--text); margin-bottom: .75rem; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-cancel { padding: 8px 16px; font-size: 13px; border: 0.5px solid var(--border); border-radius: var(--border-radius-md); background: none; color: var(--muted); cursor: pointer; }
.modal-confirm { padding: 8px 16px; font-size: 13px; border: none; border-radius: var(--border-radius-md); background: var(--accent); color: white; cursor: pointer; font-weight: 500; }

.pl-selector { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; margin-bottom: .75rem; }
.pl-sel-item { padding: 8px 12px; border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.pl-sel-item:hover { background: var(--bg2); }
.pl-sel-item.selected { background: var(--bg2); color: var(--accent); }

.empty-state { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 14px; }
.empty-icon { font-size: 32px; margin-bottom: .5rem; }

.toast { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>

<h2 class="sr-only">MP3 Music Player with playlist support</h2>

<div class="app" id="app">

  <div class="tabs">
    <button class="tab active" onclick="showTab('player')">Now Playing</button>
    <button class="tab" onclick="showTab('library')">Library</button>
    <button class="tab" onclick="showTab('playlists')">Playlists</button>
  </div>

  <div id="tab-player">
    <div class="player-card">
      <div class="now-playing-section">
        <div class="album-art" id="albumArt">🎵</div>
        <div class="track-info">
          <div class="track-title" id="trackTitle">No track loaded</div>
          <div class="track-artist" id="trackArtist">Upload some music to get started</div>
          <div class="track-playlist" id="trackPlaylist" style="display:none"></div>
        </div>
      </div>
      <div class="progress-section">
        <div class="progress-bar-wrap" id="progressBar" onclick="seek(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">⇄</button>
        <button class="ctrl-btn" onclick="prevTrack()" title="Previous">⏮</button>
        <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()" title="Next">⏭</button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">↺</button>
      </div>
      <div class="volume-row">
        <span class="vol-icon" id="volIcon">🔊</span>
        <input type="range" min="0" max="100" value="80" id="volSlider" oninput="setVolume(this.value)" style="flex:1;">
        <span class="vol-label" id="volLabel">80</span>
      </div>
    </div>

    <div id="queueSection">
      <div class="section-header"><span class="section-title">Up next</span></div>
      <div class="track-list" id="queueList"></div>
    </div>
  </div>

  <div id="tab-library" style="display:none">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <div class="upload-icon">📂</div>
      <div class="upload-text">Click to upload MP3 files</div>
      <div class="upload-sub">or drag and drop — multiple files supported</div>
    </div>
    <input type="file" id="fileInput" accept=".mp3,audio/*" multiple style="display:none" onchange="handleFiles(this.files)">

    <div class="section-header">
      <span class="section-title" id="libraryCount">Library (0)</span>
    </div>
    <div class="track-list" id="libraryList">
      <div class="empty-state"><div class="empty-icon">🎶</div>Your library is empty</div>
    </div>
  </div>

  <div id="tab-playlists" style="display:none">
    <div class="section-header">
      <span class="section-title">Playlists</span>
      <button class="add-btn" onclick="openCreatePlaylist()">+ New playlist</button>
    </div>
    <div class="playlist-list" id="playlistList">
      <div class="empty-state"><div class="empty-icon">📋</div>No playlists yet</div>
    </div>

    <div id="playlistTracksSection" style="display:none; margin-top:1.25rem;">
      <div class="section-header">
        <span class="section-title" id="playlistTracksTitle">Tracks</span>
        <button class="add-btn" onclick="addTracksToPlaylist()">+ Add tracks</button>
      </div>
      <div class="track-list" id="playlistTracksList"></div>
    </div>
  </div>

</div>

<div class="modal-bg" id="createPlaylistModal">
  <div class="modal">
    <div class="modal-title">New playlist</div>
    <input type="text" id="playlistNameInput" placeholder="Playlist name" maxlength="40">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('createPlaylistModal')">Cancel</button>
      <button class="modal-confirm" onclick="confirmCreatePlaylist()">Create</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="addToPlaylistModal">
  <div class="modal">
    <div class="modal-title">Add to playlist</div>
    <div class="pl-selector" id="plSelector"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('addToPlaylistModal')">Cancel</button>
      <button class="modal-confirm" onclick="confirmAddToPlaylist()">Add</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="addTracksModal">
  <div class="modal">
    <div class="modal-title">Add tracks</div>
    <div class="pl-selector" id="trackSelector" style="max-height:220px;"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('addTracksModal')">Cancel</button>
      <button class="modal-confirm" onclick="confirmAddTracks()">Add selected</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let library = [];
let playlists = [];
let currentTrackIdx = -1;
let currentQueue = [];
let currentPlaylistId = null;
let activePlaylistId = null;
let audio = new Audio();
let isPlaying = false;
let shuffle = false;
let repeat = 'none';
let addToPlTrackIdx = -1;
let selectedPlIds = new Set();
let selectedTrackIdxs = new Set();
let openDropdown = null;

audio.volume = 0.8;

audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('ended', onTrackEnd);
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = fmtTime(audio.duration);
});

function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function showTab(tab) {
  ['player','library','playlists'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
    document.querySelectorAll('.tab')[['player','library','playlists'].indexOf(t)].classList.toggle('active', t===tab);
  });
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('audio/') && !file.name.endsWith('.mp3')) return;
    const url = URL.createObjectURL(file);
    const name = file.name.replace(/\.[^.]+$/, '');
    let title = name, artist = 'Unknown Artist';
    if (name.includes(' - ')) { const p = name.split(' - '); artist = p[0].trim(); title = p.slice(1).join(' - ').trim(); }
    library.push({ url, title, artist, file, emoji: randomEmoji() });
    if (library.length === 1) { loadTrack(0, null); }
  });
  renderLibrary();
  toast(`Added ${files.length} track${files.length>1?'s':''}`);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  handleFiles(e.dataTransfer.files);
}

const emojis = ['🎸','🎹','🥁','🎷','🎺','🎻','🎼','🎧','🎤','🎵','🎶','🎙️'];
function randomEmoji() { return emojis[Math.floor(Math.random()*emojis.length)]; }

function loadTrack(idx, queue) {
  if (queue) currentQueue = queue;
  else if (!currentQueue.length) currentQueue = library.map((_,i)=>i);
  currentTrackIdx = queue ? queue.indexOf(idx) : currentQueue.indexOf(idx);
  if (currentTrackIdx === -1) currentTrackIdx = 0;
  const track = library[queue ? idx : currentQueue[currentTrackIdx]];
  if (!track) return;
  audio.src = track.url;
  audio.load();
  document.getElementById('trackTitle').textContent = track.title;
  document.getElementById('trackArtist').textContent = track.artist;
  document.getElementById('albumArt').textContent = track.emoji;
  const pl = playlists.find(p=>p.id===activePlaylistId);
  const plEl = document.getElementById('trackPlaylist');
  if (pl) { plEl.textContent = '▶ '+pl.name; plEl.style.display=''; }
  else plEl.style.display='none';
  if (isPlaying) { audio.play(); updatePlayBtn(); }
  renderQueue();
  renderLibrary();
}

function togglePlay() {
  if (!audio.src) return;
  isPlaying ? audio.pause() : audio.play();
  isPlaying = !isPlaying;
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let ni = currentTrackIdx - 1;
  if (ni < 0) ni = currentQueue.length - 1;
  currentTrackIdx = ni;
  loadTrack(currentQueue[ni], null);
  if (isPlaying) audio.play();
}

function nextTrack() {
  let ni;
  if (shuffle) ni = Math.floor(Math.random()*currentQueue.length);
  else { ni = currentTrackIdx + 1; if (ni >= currentQueue.length) ni = 0; }
  currentTrackIdx = ni;
  loadTrack(currentQueue[ni], null);
  if (isPlaying) audio.play();
}

function onTrackEnd() {
  if (repeat === 'one') { audio.currentTime=0; audio.play(); }
  else nextTrack();
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffle);
}

function toggleRepeat() {
  const modes = ['none','all','one'];
  repeat = modes[(modes.indexOf(repeat)+1)%3];
  const btn = document.getElementById('repeatBtn');
  btn.classList.toggle('active', repeat!=='none');
  btn.title = repeat==='one'?'Repeat one':repeat==='all'?'Repeat all':'Repeat off';
  btn.textContent = repeat==='one'?'↺¹':'↺';
}

function seek(e) {
  const bar = document.getElementById('progressBar');
  const pct = (e.offsetX / bar.offsetWidth);
  audio.currentTime = pct * audio.duration;
}

function updateProgress() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('currentTime').textContent = fmtTime(audio.currentTime);
}

function setVolume(v) {
  audio.volume = v/100;
  document.getElementById('volLabel').textContent = v;
  document.getElementById('volIcon').textContent = v==0?'🔇':v<50?'🔉':'🔊';
}

function renderLibrary() {
  const list = document.getElementById('libraryList');
  document.getElementById('libraryCount').textContent = `Library (${library.length})`;
  if (!library.length) { list.innerHTML='<div class="empty-state"><div class="empty-icon">🎶</div>Your library is empty</div>'; return; }
  list.innerHTML = library.map((t,i) => `
    <div class="track-item ${currentQueue[currentTrackIdx]===i&&isPlaying?'active':''}" ondblclick="playFromLibrary(${i})">
      <span class="track-num">${currentQueue[currentTrackIdx]===i&&isPlaying?'▶':i+1}</span>
      <div class="track-item-art">${t.emoji}</div>
      <div class="track-item-info">
        <div class="track-item-title">${esc(t.title)}</div>
        <div class="track-item-artist">${esc(t.artist)}</div>
      </div>
      <div class="track-item-menu" id="menu-lib-${i}">
        <button class="track-menu-btn" onclick="toggleMenu(event,'menu-lib-${i}')">⋯</button>
        <div class="dropdown" id="drop-lib-${i}" style="display:none">
          <div class="dropdown-item" onclick="playFromLibrary(${i})">▶ Play now</div>
          <div class="dropdown-item" onclick="openAddToPlaylist(${i})">+ Add to playlist</div>
          <div class="dropdown-item danger" onclick="removeFromLibrary(${i})">✕ Remove</div>
        </div>
      </div>
    </div>`).join('');
}

function playFromLibrary(i) {
  currentQueue = library.map((_,j)=>j);
  activePlaylistId = null;
  loadTrack(i, null);
  isPlaying = true;
  audio.play();
  updatePlayBtn();
  showTab('player');
}

function removeFromLibrary(i) {
  URL.revokeObjectURL(library[i].url);
  library.splice(i,1);
  playlists.forEach(p=>{ p.tracks = p.tracks.filter(t=>t!==i).map(t=>t>i?t-1:t); });
  renderLibrary();
  renderPlaylists();
  toast('Removed from library');
}

function renderQueue() {
  const list = document.getElementById('queueList');
  const next = currentQueue.slice(currentTrackIdx+1, currentTrackIdx+6);
  if (!next.length) { list.innerHTML='<div class="empty-state" style="padding:1rem"><div>No more tracks queued</div></div>'; return; }
  list.innerHTML = next.map((ti,i) => {
    const t = library[ti]; if(!t) return '';
    return `<div class="track-item" ondblclick="jumpQueue(${currentTrackIdx+1+i})">
      <span class="track-num">${i+1}</span>
      <div class="track-item-art">${t.emoji}</div>
      <div class="track-item-info">
        <div class="track-item-title">${esc(t.title)}</div>
        <div class="track-item-artist">${esc(t.artist)}</div>
      </div>
    </div>`;
  }).join('');
}

function jumpQueue(idx) {
  currentTrackIdx = idx;
  loadTrack(currentQueue[idx], null);
  isPlaying = true; audio.play(); updatePlayBtn();
}

function openCreatePlaylist() {
  document.getElementById('playlistNameInput').value = '';
  openModal('createPlaylistModal');
  setTimeout(()=>document.getElementById('playlistNameInput').focus(), 100);
}

function confirmCreatePlaylist() {
  const name = document.getElementById('playlistNameInput').value.trim();
  if (!name) return;
  playlists.push({ id: Date.now(), name, tracks: [], emoji: randomEmoji() });
  closeModal('createPlaylistModal');
  renderPlaylists();
  toast(`Playlist "${name}" created`);
}

function renderPlaylists() {
  const list = document.getElementById('playlistList');
  if (!playlists.length) { list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>No playlists yet</div>'; document.getElementById('playlistTracksSection').style.display='none'; return; }
  list.innerHTML = playlists.map(pl => `
    <div class="playlist-item ${currentPlaylistId===pl.id?'active':''}" onclick="openPlaylist(${pl.id})">
      <div class="pl-icon">${pl.emoji}</div>
      <div class="pl-info">
        <div class="pl-name">${esc(pl.name)}</div>
        <div class="pl-count">${pl.tracks.length} track${pl.tracks.length!==1?'s':''}</div>
      </div>
      <div class="pl-actions">
        <button class="pl-act-btn" onclick="event.stopPropagation();playPlaylist(${pl.id})" title="Play">▶</button>
        <button class="pl-act-btn danger" onclick="event.stopPropagation();deletePlaylist(${pl.id})" title="Delete" style="color:#E24B4A">✕</button>
      </div>
    </div>`).join('');
}

function openPlaylist(id) {
  currentPlaylistId = id;
  renderPlaylists();
  const pl = playlists.find(p=>p.id===id);
  if (!pl) return;
  document.getElementById('playlistTracksSection').style.display = '';
  document.getElementById('playlistTracksTitle').textContent = pl.name;
  renderPlaylistTracks(pl);
}

function renderPlaylistTracks(pl) {
  const list = document.getElementById('playlistTracksList');
  if (!pl.tracks.length) { list.innerHTML='<div class="empty-state" style="padding:1rem"><div>No tracks — click "Add tracks"</div></div>'; return; }
  list.innerHTML = pl.tracks.map((ti,pos) => {
    const t = library[ti]; if(!t) return '';
    return `<div class="track-item" ondblclick="playPlaylistFrom(${pl.id},${pos})">
      <span class="track-num">${pos+1}</span>
      <div class="track-item-art">${t.emoji}</div>
      <div class="track-item-info">
        <div class="track-item-title">${esc(t.title)}</div>
        <div class="track-item-artist">${esc(t.artist)}</div>
      </div>
      <div class="track-item-menu">
        <button class="track-menu-btn" onclick="toggleMenu(event,'menu-pl-${pl.id}-${pos}')">⋯</button>
        <div class="dropdown" id="menu-pl-${pl.id}-${pos}" style="display:none">
          <div class="dropdown-item" onclick="playPlaylistFrom(${pl.id},${pos})">▶ Play</div>
          <div class="dropdown-item danger" onclick="removeFromPlaylist(${pl.id},${pos})">✕ Remove</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function playPlaylist(id) {
  const pl = playlists.find(p=>p.id===id);
  if (!pl||!pl.tracks.length) { toast('Playlist is empty'); return; }
  playPlaylistFrom(id, 0);
}

function playPlaylistFrom(id, pos) {
  const pl = playlists.find(p=>p.id===id);
  if (!pl) return;
  activePlaylistId = id;
  currentQueue = [...pl.tracks];
  currentTrackIdx = pos;
  loadTrack(currentQueue[pos], null);
  isPlaying = true; audio.play(); updatePlayBtn();
  showTab('player');
}

function deletePlaylist(id) {
  playlists = playlists.filter(p=>p.id!==id);
  if (currentPlaylistId===id) { currentPlaylistId=null; document.getElementById('playlistTracksSection').style.display='none'; }
  renderPlaylists();
  toast('Playlist deleted');
}

function removeFromPlaylist(plId, pos) {
  const pl = playlists.find(p=>p.id===plId);
  if (!pl) return;
  pl.tracks.splice(pos,1);
  renderPlaylistTracks(pl);
  renderPlaylists();
  toast('Removed from playlist');
}

function openAddToPlaylist(idx) {
  addToPlTrackIdx = idx;
  selectedPlIds.clear();
  const sel = document.getElementById('plSelector');
  if (!playlists.length) { toast('Create a playlist first'); return; }
  sel.innerHTML = playlists.map(pl=>`
    <div class="pl-sel-item" id="plsel-${pl.id}" onclick="togglePlSel(${pl.id})">
      <span>${pl.emoji}</span> ${esc(pl.name)}
    </div>`).join('');
  openModal('addToPlaylistModal');
}

function togglePlSel(id) {
  if (selectedPlIds.has(id)) selectedPlIds.delete(id);
  else selectedPlIds.add(id);
  document.querySelectorAll('[id^="plsel-"]').forEach(el => {
    const pid = parseInt(el.id.replace('plsel-',''));
    el.classList.toggle('selected', selectedPlIds.has(pid));
  });
}

function confirmAddToPlaylist() {
  if (!selectedPlIds.size) { closeModal('addToPlaylistModal'); return; }
  selectedPlIds.forEach(id => {
    const pl = playlists.find(p=>p.id===id);
    if (pl && !pl.tracks.includes(addToPlTrackIdx)) pl.tracks.push(addToPlTrackIdx);
  });
  closeModal('addToPlaylistModal');
  renderPlaylists();
  if (currentPlaylistId) { const pl=playlists.find(p=>p.id===currentPlaylistId); if(pl) renderPlaylistTracks(pl); }
  toast(`Added to ${selectedPlIds.size} playlist${selectedPlIds.size>1?'s':''}`);
}

function addTracksToPlaylist() {
  const pl = playlists.find(p=>p.id===currentPlaylistId);
  if (!pl) return;
  if (!library.length) { toast('Upload tracks to your library first'); return; }
  selectedTrackIdxs.clear();
  const sel = document.getElementById('trackSelector');
  sel.innerHTML = library.map((t,i)=>`
    <div class="pl-sel-item" id="trsel-${i}" onclick="toggleTrackSel(${i})">
      <span>${t.emoji}</span>
      <span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(t.title)}</span>
      ${pl.tracks.includes(i)?'<span style="font-size:11px;color:var(--muted)">added</span>':''}
    </div>`).join('');
  openModal('addTracksModal');
}

function toggleTrackSel(i) {
  if (selectedTrackIdxs.has(i)) selectedTrackIdxs.delete(i);
  else selectedTrackIdxs.add(i);
  const el = document.getElementById('trsel-'+i);
  if (el) el.classList.toggle('selected', selectedTrackIdxs.has(i));
}

function confirmAddTracks() {
  const pl = playlists.find(p=>p.id===currentPlaylistId);
  if (!pl) { closeModal('addTracksModal'); return; }
  let added = 0;
  selectedTrackIdxs.forEach(i => { if (!pl.tracks.includes(i)) { pl.tracks.push(i); added++; } });
  closeModal('addTracksModal');
  renderPlaylists();
  renderPlaylistTracks(pl);
  toast(added?`Added ${added} track${added>1?'s':''}` : 'Already in playlist');
}

function toggleMenu(e, id) {
  e.stopPropagation();
  const drop = document.getElementById(id);
  if (!drop) return;
  if (openDropdown && openDropdown !== drop) openDropdown.style.display='none';
  drop.style.display = drop.style.display==='none' ? 'block' : 'none';
  openDropdown = drop.style.display==='block' ? drop : null;
}

document.addEventListener('click', ()=>{ if(openDropdown){openDropdown.style.display='none';openDropdown=null;} });

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); }));

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
</script>
